services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_APP_NAME=${VITE_APP_NAME}
    ports:
      - "${WEB_PORT}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
